  name: nexus-grafana
  namespace: nexus-platform
  labels:
    app: nexus-platform
    component: grafana
spec:
  type: ClusterIP
  ports:
  - port: 3000
    targetPort: 3000
    protocol: TCP
    name: grafana
  selector:
    app: nexus-grafana

---
apiVersion: v1
kind: Service
metadata:
  name: nexus-postgres
  namespace: nexus-platform
  labels:
    app: nexus-platform
    component: postgres
spec:
  type: ClusterIP
  ports:
  - port: 5432
    targetPort: 5432
    protocol: TCP
    name: postgres
  selector:
    app: nexus-postgres

---
apiVersion: v1
kind: Service
metadata:
  name: nexus-redis
  namespace: nexus-platform
  labels:
    app: nexus-platform
    component: redis
spec:
  type: ClusterIP
  ports:
  - port: 6379
    targetPort: 6379
    protocol: TCP
    name: redis
  selector:
    app: nexus-redis

---
apiVersion: v1
kind: Service
metadata:
  name: nexus-rabbitmq
  namespace: nexus-platform
  labels:
    app: nexus-platform
    component: rabbitmq
spec:
  type: ClusterIP
  ports:
  - port: 5672
    targetPort: 5672
    protocol: TCP
    name: amqp
  - port: 15672
    targetPort: 15672
    protocol: TCP
    name: management
  selector:
