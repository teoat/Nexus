  name: nexus-monitoring
  namespace: nexus-platform
  labels:
    app: nexus-platform
    component: monitoring
spec:
  type: ClusterIP
  ports:
  - port: 9090
    targetPort: 9090
    protocol: TCP
    name: prometheus
  selector:
    app: nexus-monitoring

---
apiVersion: v1
kind: Service
