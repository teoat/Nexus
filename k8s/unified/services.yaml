---
apiVersion: v1
kind: Service
metadata:
  name: nexus-minio
  namespace: nexus-platform
  labels:
    app: nexus-platform
    component: minio
spec:
  type: ClusterIP
  ports:
  - port: 9000
    targetPort: 9000
    protocol: TCP
    name: api
  - port: 9001
    targetPort: 9001
    protocol: TCP
    name: console
  selector:
    app: nexus-minio

---
# Ingress for external access
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nexus-ingress
  namespace: nexus-platform
  labels:
    app: nexus-platform
    component: ingress
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "60s"
spec:
  tls:
  - hosts:
    - api.nexus.local
    - auth.nexus.local
    - ui.nexus.local
    - sot.nexus.local
    - monitoring.nexus.local
    - grafana.nexus.local
    secretName: nexus-tls-secrets
  rules:
  - host: api.nexus.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nexus-api
            port:
              number: 5000
  - host: auth.nexus.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nexus-auth
            port:
              number: 5001
  - host: ui.nexus.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nexus-ui
            port:
              number: 3000
  - host: sot.nexus.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nexus-sot
            port:
              number: 8000
  - host: monitoring.nexus.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nexus-monitoring
            port:
              number: 9090
  - host: grafana.nexus.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nexus-grafana
            port:
              number: 3000
