# Nexus Platform - Unified Kubernetes Services
# Service definitions for all components

apiVersion: v1
kind: Service
metadata:
  name: nexus-nginx
  namespace: nexus-platform
  labels:
    app: nexus-platform
    component: nginx
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
  - port: 443
    targetPort: 443
    protocol: TCP
    name: https
  selector:
    app: nexus-nginx

---
apiVersion: v1
kind: Service
metadata:
  name: nexus-api
  namespace: nexus-platform
  labels:
    app: nexus-platform
    component: api
spec:
  type: ClusterIP
  ports:
  - port: 5000
    targetPort: 5000
    protocol: TCP
    name: api
  selector:
    app: nexus-api

---
apiVersion: v1
kind: Service
metadata:
  name: nexus-auth
  namespace: nexus-platform
  labels:
    app: nexus-platform
    component: auth
spec:
  type: ClusterIP
  ports:
  - port: 5001
    targetPort: 5001
    protocol: TCP
    name: auth
  selector:
    app: nexus-auth

---
apiVersion: v1
kind: Service
metadata:
  name: nexus-ui
  namespace: nexus-platform
  labels:
    app: nexus-platform
    component: ui
spec:
  type: ClusterIP
  ports:
  - port: 3000
    targetPort: 3000
    protocol: TCP
    name: ui
  selector:
    app: nexus-ui

---
apiVersion: v1
kind: Service
metadata:
  name: nexus-sot
  namespace: nexus-platform
  labels:
    app: nexus-platform
    component: sot
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: sot
  selector:
    app: nexus-sot

---
apiVersion: v1
kind: Service
