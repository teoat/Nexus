# Nexus Platform - Unified Kubernetes Secrets
# Secure secret management for all services

apiVersion: v1
kind: Secret
metadata:
  name: nexus-secrets
  namespace: nexus-platform
  labels:
    app: nexus-platform
    component: secrets
type: Opaque
data:
  # Base64 encoded secrets (use: echo -n "password" | base64)
  postgres-password: bmV4dXNfcGFzc3dvcmQ=  # nexus_password
  redis-password: bmV4dXNfcmVkaXNfcGFzc3dvcmQ=  # nexus_redis_password
  rabbitmq-password: bmV4dXNfcGFzc3dvcmQ=  # nexus_password
  neo4j-password: bmV4dXNfbmVvNGpfcGFzc3dvcmQ=  # nexus_neo4j_password
  minio-password: bmV4dXNfbWluaW9fcGFzc3dvcmQ=  # nexus_minio_password
  grafana-password: YWRtaW4xMjM=  # admin123
  jwt-secret: bmV4dXNfanR3X3NlY3JldF9rZXlfY2hhbmdlX2luX3Byb2R1Y3Rpb24=  # nexus_jwt_secret_key_change_in_production

---
apiVersion: v1
kind: Secret
metadata:
  name: nexus-tls-secrets
  namespace: nexus-platform
  labels:
    app: nexus-platform
    component: tls
type: kubernetes.io/tls
data:
  # TLS certificates (will be populated by cert-manager or manually)
  tls.crt: ""
  tls.key: ""

---
apiVersion: v1
kind: Secret
metadata:
  name: nexus-registry-secret
  namespace: nexus-platform
  labels:
    app: nexus-platform
    component: registry
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: ""  # Will be populated for private registry access
