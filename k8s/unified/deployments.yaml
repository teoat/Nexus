# Nexus Platform - Unified Kubernetes Deployments
# Production-ready deployments with proper resource management

apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus-nginx
  namespace: nexus-platform
  labels:
    app: nexus-platform
    component: nginx
    tier: proxy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nexus-nginx
  template:
    metadata:
      labels:
        app: nexus-nginx
        component: nginx
        tier: proxy
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        - containerPort: 443
        resources:
          requests:
            memory: "128Mi"
            cpu: "250m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
        - name: nginx-logs
          mountPath: /var/log/nginx
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: nginx-config
        configMap:
          name: nginx-config
      - name: nginx-logs
        emptyDir: {}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus-api
  namespace: nexus-platform
  labels:
    app: nexus-platform
    component: api
    tier: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nexus-api
  template:
    metadata:
      labels:
        app: nexus-api
        component: api
        tier: backend
    spec:
      containers:
      - name: api
        image: nexus-api:latest
        ports:
        - containerPort: 5000
        env:
        - name: FLASK_ENV
          value: "production"
        - name: REDIS_URL
          value: "redis://nexus-redis:6379/0"
        - name: DATABASE_URL
          value: "postgresql://nexus:$(POSTGRES_PASSWORD)@nexus-postgres:5432/nexus_db"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: nexus-secrets
              key: postgres-password
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
        volumeMounts:
        - name: logs
          mountPath: /app/logs
      volumes:
      - name: logs
        emptyDir: {}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus-auth
  namespace: nexus-platform
  labels:
    app: nexus-platform
    component: auth
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nexus-auth
  template:
    metadata:
      labels:
        app: nexus-auth
        component: auth
        tier: backend
    spec:
      containers:
      - name: auth
        image: nexus-auth:latest
        ports:
        - containerPort: 5001
        env:
        - name: AUTH_ENV
          value: "production"
        - name: REDIS_URL
          value: "redis://nexus-redis:6379/1"
        - name: DATABASE_URL
          value: "postgresql://nexus:$(POSTGRES_PASSWORD)@nexus-postgres:5432/nexus_auth"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: nexus-secrets
              key: jwt-secret
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: nexus-secrets
              key: postgres-password
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5001
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 5001
          initialDelaySeconds: 30
          periodSeconds: 10

