# Nexus Platform - Python Configuration
# Single source of truth for Python configuration

# Python Environment
python:
  version: 3.12.11
  environment_name: nexus_env
  requirements_file: requirements.txt
  
# Platform Paths
paths:
  environment_path: ./nexus_env
  activation_script_unix: ./activate_nexus_env.sh
  activation_script_windows: ./activate_nexus_env.ps1
  launcher_script_unix: ./nexus_python.sh
  launcher_script_windows: ./nexus_python.ps1

# Package Management
package_management:
  primary_requirements: requirements.txt
  allow_user_installs: false
  auto_update_requirements: true
  check_compatibility: true
  
# Development Settings
development:
  formatter: black
  linter: flake8
  type_checker: mypy
  test_framework: pytest
  
# Runtime Settings
runtime:
  debug: false
  log_level: INFO
  environment: development  # Options: development, testing, production
  
# Service Configurations
services:
  api_gateway:
    host: 0.0.0.0
    port: 8000
    workers: 4
    log_level: INFO
    
  ai_engine:
    host: 0.0.0.0
    port: 8001
    workers: 2
    log_level: INFO
    models_path: ./backend/ai_engine/models
    
  fraud_detection:
    host: 0.0.0.0
    port: 8002
    workers: 2
    log_level: INFO
    
  forensic_analysis:
    host: 0.0.0.0
    port: 8003
    workers: 2
    log_level: INFO
    
  frenly_ai:
    host: 0.0.0.0
    port: 8004
    workers: 2
    log_level: INFO

# Database Configurations
databases:
  postgresql:
    host: localhost
    port: 5432
    database: nexus_db
    user: nexus_user
    password_env: POSTGRES_PASSWORD
    
  neo4j:
    host: localhost
    port: 7687
    user: neo4j
    password_env: NEO4J_PASSWORD
    
  redis:
    host: localhost
    port: 6379
    db: 0
    
  minio:
    host: localhost
    port: 9000
    access_key_env: MINIO_ACCESS_KEY
    secret_key_env: MINIO_SECRET_KEY

# Messaging
messaging:
  rabbitmq:
    host: localhost
    port: 5672
    user: guest
    password_env: RABBITMQ_PASSWORD
    virtual_host: /
    
# AI Configuration
ai:
  openai:
    api_key_env: OPENAI_API_KEY
    default_model: gpt-4
    
  anthropic:
    api_key_env: ANTHROPIC_API_KEY
    default_model: claude-3-opus-20240229
    
  mcp:
    enabled: true
    version: 1.1.1

# Monitoring
monitoring:
  prometheus:
    host: localhost
    port: 9090
    
  grafana:
    host: localhost
    port: 3000
    
  alertmanager:
    host: localhost
    port: 9093
