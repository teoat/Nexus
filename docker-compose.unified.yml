# Nexus Platform - Unified Docker Compose Configuration
# Comprehensive production-ready setup with semantic service names
# Optimized for development, staging, and production environments

version: '3.8'

x-common-variables: &common-variables
  TZ: UTC
  PYTHONUNBUFFERED: 1
  PYTHONDONTWRITEBYTECODE: 1

x-common-logging: &common-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-common-networks: &common-networks
  - nexus-network

x-common-restart: &common-restart
  restart: unless-stopped

x-common-healthcheck: &common-healthcheck
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 40s

networks:
  nexus-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
    labels:
      - "nexus.network=main"

volumes:
  postgres_data:
    driver: local
    labels:
      - "nexus.volume=postgres"
  redis_data:
    driver: local
    labels:
      - "nexus.volume=redis"
  rabbitmq_data:
    driver: local
    labels:
      - "nexus.volume=rabbitmq"
  prometheus_data:
    driver: local
    labels:
      - "nexus.volume=prometheus"
  grafana_data:
    driver: local
    labels:
      - "nexus.volume=grafana"
  neo4j_data:
    driver: local
    labels:
      - "nexus.volume=neo4j"
  minio_data:
    driver: local
    labels:
      - "nexus.volume=minio"
  nginx_logs:
    driver: local
    labels:
      - "nexus.volume=nginx-logs"

services:
  # =============================================================================
  # REVERSE PROXY & API GATEWAY
  # =============================================================================
  
  nginx:
    image: nginx:alpine
    container_name: nexus-nginx
    hostname: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    environment:
      <<: *common-variables
    networks:
      <<: *common-networks
    restart: unless-stopped
    healthcheck:
      <<: *common-healthcheck
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
    labels:
      - "nexus.service=nginx"
      - "nexus.role=proxy"
    depends_on:
      api:
        condition: service_healthy
      auth:
        condition: service_healthy
      ui:
        condition: service_healthy
      sot:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.25'

  # =============================================================================
  # CORE APPLICATION SERVICES
  # =============================================================================

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
      args:
        BUILD_ENV: production
    container_name: nexus-api
    hostname: api
    ports:
      - "5000:5000"
    environment:
      <<: *common-variables
      FLASK_ENV: production
      FLASK_APP: nexus_web_launcher.py
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://nexus:${POSTGRES_PASSWORD:-nexus_password}@postgres:5432/nexus_db
      RABBITMQ_URL: amqp://nexus:${RABBITMQ_PASSWORD:-nexus_password}@rabbitmq:5672/nexus
      LOG_LEVEL: INFO
    volumes:
      - ./logs:/app/logs
    networks:
      <<: *common-networks
    restart: unless-stopped
    healthcheck:
      <<: *common-healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
    labels:
      - "nexus.service=api"
      - "nexus.role=backend"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'

  auth:
    build:
      context: .
      dockerfile: docker/auth.Dockerfile
      args:
        BUILD_ENV: production
    container_name: nexus-auth
    hostname: auth
    ports:
      - "5001:5001"
    environment:
      <<: *common-variables
      AUTH_ENV: production
      REDIS_URL: redis://redis:6379/1
      DATABASE_URL: postgresql://nexus:${POSTGRES_PASSWORD:-nexus_password}@postgres:5432/nexus_auth
      JWT_SECRET: ${JWT_SECRET:-nexus_jwt_secret_key_change_in_production}
      LOG_LEVEL: INFO
    volumes:
      - ./logs:/app/logs
    networks:
      <<: *common-networks
    restart: unless-stopped
    healthcheck:
      <<: *common-healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
    labels:
      - "nexus.service=auth"
      - "nexus.role=backend"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

  ui:
    build:
      context: .
      dockerfile: docker/ui.Dockerfile
      args:
        BUILD_ENV: production
    container_name: nexus-ui
    hostname: ui
    ports:
      - "3000:3000"
    environment:
      <<: *common-variables
      NODE_ENV: production
      REACT_APP_API_URL: https://api.local
      REACT_APP_AUTH_URL: https://auth.local
      REACT_APP_SOT_URL: https://sot.local
      REACT_APP_MONITORING_URL: https://monitoring.local
    networks:
      <<: *common-networks
    restart: unless-stopped
    healthcheck:
      <<: *common-healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
    labels:
      - "nexus.service=ui"
      - "nexus.role=frontend"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'

  sot:
    build:
      context: .
      dockerfile: docker/sot.Dockerfile
      args:
        BUILD_ENV: production
    container_name: nexus-sot
    hostname: sot
    ports:
      - "8000:8000"
    environment:
      <<: *common-variables
      SOT_ENV: production
      REDIS_URL: redis://redis:6379/2
      DATABASE_URL: postgresql://nexus:${POSTGRES_PASSWORD:-nexus_password}@postgres:5432/nexus_sot
      RABBITMQ_URL: amqp://nexus:${RABBITMQ_PASSWORD:-nexus_password}@rabbitmq:5672/sot
      LOG_LEVEL: INFO
    volumes:
      - ./logs:/app/logs
    networks:
      <<: *common-networks
    restart: unless-stopped
    healthcheck:
      <<: *common-healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
    labels:
      - "nexus.service=sot"
      - "nexus.role=backend"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

  # =============================================================================
  # MONITORING & OBSERVABILITY
  # =============================================================================

  monitoring:
    image: prom/prometheus:latest
    container_name: nexus-monitoring
    hostname: monitoring
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    environment:
      <<: *common-variables
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    networks:
      <<: *common-networks
    restart: unless-stopped
    healthcheck:
      <<: *common-healthcheck
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
    labels:
      - "nexus.service=monitoring"
      - "nexus.role=monitoring"
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'

  grafana:
    image: grafana/grafana:latest
    container_name: nexus-grafana
    hostname: grafana
    ports:
      - "3001:3000"
    environment:
      <<: *common-variables
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
      GF_USERS_ALLOW_SIGN_UP: false
      GF_INSTALL_PLUGINS: grafana-piechart-panel,grafana-worldmap-panel
      GF_SECURITY_DISABLE_GRAVATAR: true
      GF_ANALYTICS_REPORTING_ENABLED: false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      <<: *common-networks
    restart: unless-stopped
    healthcheck:
      <<: *common-healthcheck
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
    labels:
      - "nexus.service=grafana"
      - "nexus.role=monitoring"
    depends_on:
      monitoring:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'

  # =============================================================================
  # DATA LAYER
  # =============================================================================

  postgres:
    image: postgres:16-alpine
    container_name: nexus-postgres
    hostname: postgres
    ports:
      - "5432:5432"
    environment:
      <<: *common-variables
      POSTGRES_DB: nexus_db
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexus_password}
      POSTGRES_MULTIPLE_DATABASES: nexus_auth,nexus_sot,nexus_analytics
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-multiple-databases.sh:/docker-entrypoint-initdb.d/init-multiple-databases.sh
    networks:
      <<: *common-networks
    restart: unless-stopped
    healthcheck:
      <<: *common-healthcheck
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus_db"]
    labels:
      - "nexus.service=postgres"
      - "nexus.role=database"
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'

  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    hostname: redis
    ports:
      - "6379:6379"
    command: >
      redis-server 
      --appendonly yes 
      --maxmemory 512mb 
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:-nexus_redis_password}
    volumes:
      - redis_data:/data
    networks:
      <<: *common-networks
    restart: unless-stopped
    healthcheck:
      <<: *common-healthcheck
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-nexus_redis_password}", "ping"]
    labels:
      - "nexus.service=redis"
      - "nexus.role=cache"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: nexus-rabbitmq
    hostname: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      <<: *common-variables
      RABBITMQ_DEFAULT_USER: nexus
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-nexus_password}
      RABBITMQ_DEFAULT_VHOST: nexus
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      <<: *common-networks
    restart: unless-stopped
    healthcheck:
      <<: *common-healthcheck
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
    labels:
      - "nexus.service=rabbitmq"
      - "nexus.role=message-broker"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'

  neo4j:
    image: neo4j:5.15-community
    container_name: nexus-neo4j
    hostname: neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      <<: *common-variables
      NEO4J_AUTH: nexus/${NEO4J_PASSWORD:-nexus_neo4j_password}
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*,gds.*
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 1G
    volumes:
      - neo4j_data:/data
      - neo4j_data:/logs
      - neo4j_data:/import
      - neo4j_data:/plugins
    networks:
      <<: *common-networks
    restart: unless-stopped
    healthcheck:
      <<: *common-healthcheck
      test: ["CMD", "cypher-shell", "-u", "nexus", "-p", "${NEO4J_PASSWORD:-nexus_neo4j_password}", "RETURN 1"]
    labels:
      - "nexus.service=neo4j"
      - "nexus.role=database"
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'

  minio:
    image: minio/minio:latest
    container_name: nexus-minio
    hostname: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      <<: *common-variables
      MINIO_ROOT_USER: nexus
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-nexus_minio_password}
    volumes:
      - minio_data:/data
    networks:
      <<: *common-networks
    restart: unless-stopped
    healthcheck:
      <<: *common-healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
    command: server /data --console-address ":9001"
    labels:
      - "nexus.service=minio"
      - "nexus.role=storage"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'

  # =============================================================================
  # DEVELOPMENT & DEBUGGING TOOLS
  # =============================================================================

  mailhog:
    image: mailhog/mailhog:latest
    container_name: nexus-mailhog
    hostname: mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      <<: *common-networks
    restart: unless-stopped
    labels:
      - "nexus.service=mailhog"
      - "nexus.role=development"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 128M
          cpus: '0.1'

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: nexus-jaeger
    hostname: jaeger
    ports:
      - "16686:16686"
      - "14268:14268"
    environment:
      <<: *common-variables
      COLLECTOR_OTLP_ENABLED: true
    networks:
      <<: *common-networks
    restart: unless-stopped
    labels:
      - "nexus.service=jaeger"
      - "nexus.role=observability"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
